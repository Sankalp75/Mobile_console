<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Mobile Console — Your phone is the controller.">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mobile Console</title>
    <link rel="stylesheet" href="css/controller.css">
</head>
<body>

    <!-- ─── CONNECT CODE SCREEN ─────────────────────────────────── -->
    <div id="connect-screen" class="connect-screen">
        <div class="connect-content">
            <div class="connect-icon">📱</div>
            <h2>Connect to PC</h2>
            <p>Enter the 6-digit code shown on your computer</p>
            
            <div class="code-input-container">
                <input type="text" id="connect-code" maxlength="6" placeholder="000000" inputmode="numeric" pattern="[0-9]*">
            </div>
            
            <button id="connect-btn" class="connect-button">Connect</button>
            <p id="connect-error" class="connect-error"></p>
        </div>
    </div>

    <!-- ─── START OVERLAY ────────────────────────────────────────── -->
    <div id="start-overlay">
        <div class="start-content">
            <div class="start-icon">🎮</div>
            <h1>Mobile Console</h1>
            <p>Your phone is the controller</p>
            
            <div class="theme-selector">
                <button class="theme-btn active" data-theme="default">Xbox</button>
                <button class="theme-btn" data-theme="neon">Neon</button>
                <button class="theme-btn" data-theme="retro">Retro</button>
                <button class="theme-btn" data-theme="stealth">Stealth</button>
            </div>

            <button id="start-btn" class="start-button">Tap to Start</button>
        </div>
    </div>

    <!-- ─── CONNECTION STATUS ────────────────────────────────────── -->
    <div id="connection-status" class="status-dot disconnected" title="Disconnected">
        <span class="status-label">●</span>
    </div>

    <!-- ─── CONTROLLER AREA (Dynamic - built by Layout engine) ───── -->
    <div id="controller" class="controller hidden">
    </div>

    <!-- ─── SETTINGS PANEL ───────────────────────────────────────── -->
    <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-header">
            <h3>Settings</h3>
            <button id="settings-close">✕</button>
        </div>
        
        <div class="settings-content">
            <div class="settings-section">
                <h4>Actions</h4>
                <p class="settings-desc">Long-press any button to remap</p>
            </div>
            
            <div class="settings-section">
                <h4>Add Button</h4>
                <div class="add-buttons-row">
                    <button class="add-btn" data-add="button">+ Button</button>
                    <button class="add-btn" data-add="joystick">+ Stick</button>
                </div>
            </div>
            
            <div class="settings-section">
                <h4>Gyroscope</h4>
                <label class="toggle-label">
                    <span>Enable Gyro</span>
                    <input type="checkbox" id="setting-gyro" checked>
                </label>
                <label class="range-label">
                    <span>Sensitivity</span>
                    <input type="range" id="setting-gyro-sens" min="0.5" max="3" step="0.1" value="1">
                </label>
            </div>
            
            <div class="settings-section">
                <h4>Haptics</h4>
                <label class="toggle-label">
                    <span>Vibration</span>
                    <input type="checkbox" id="setting-haptic" checked>
                </label>
            </div>
            
            <div class="settings-section">
                <h4>Profiles</h4>
                <div class="profile-actions">
                    <button class="profile-btn" id="save-profile">Save</button>
                    <button class="profile-btn" id="load-profile">Load</button>
                    <button class="profile-btn" id="reset-profile">Reset</button>
                </div>
                <div id="profile-list" class="profile-list"></div>
            </div>
        </div>
    </div>

    <!-- ─── SCRIPTS ──────────────────────────────────────────────── -->
    <script src="js/themes.js"></script>
    <script src="js/haptics.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/sensors.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
